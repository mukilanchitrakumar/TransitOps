services:
  - type: web
    name: transitops-app
    env: node
    plan: starter
    buildCommand: npm install && npm run build && cd backend && npx prisma generate && npx prisma migrate deploy && npm run prisma:seed
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: transitops-db
    plan: starter
    databaseName: transitops
    user: transit_admin

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Globe/Network Icon -->
  <g transform="translate(10, 5)">
    <!-- Outer globe circle -->
    <circle cx="55" cy="55" r="42" stroke="url(#globeGrad)" stroke-width="2.5" fill="none" opacity="0.3"/>
    <!-- Inner network hexagon shape -->
    <path d="M55 18 L82 35 L82 70 L55 88 L28 70 L28 35Z" stroke="url(#networkGrad)" stroke-width="2" fill="url(#hexFill)" opacity="0.15"/>
    <!-- Network nodes -->
    <circle cx="55" cy="18" r="4" fill="#0EA5E9"/>
    <circle cx="82" cy="35" r="3.5" fill="#14B8A6"/>
    <circle cx="82" cy="70" r="4" fill="#0F766E"/>
    <circle cx="55" cy="88" r="3.5" fill="#0EA5E9"/>
    <circle cx="28" cy="70" r="4" fill="#14B8A6"/>
    <circle cx="28" cy="35" r="3.5" fill="#0F766E"/>
    <!-- Center node -->
    <circle cx="55" cy="53" r="6" fill="url(#centerGrad)"/>
    <circle cx="55" cy="53" r="3" fill="white"/>
    <!-- Network lines -->
    <line x1="55" y1="18" x2="82" y2="35" stroke="#14B8A6" stroke-width="1.2" opacity="0.5"/>
    <line x1="82" y1="35" x2="82" y2="70" stroke="#0F766E" stroke-width="1.2" opacity="0.5"/>
    <line x1="82" y1="70" x2="55" y2="88" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
    <line x1="55" y1="88" x2="28" y2="70" stroke="#14B8A6" stroke-width="1.2" opacity="0.5"/>
    <line x1="28" y1="70" x2="28" y2="35" stroke="#0F766E" stroke-width="1.2" opacity="0.5"/>
    <line x1="28" y1="35" x2="55" y2="18" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
    <!-- Cross connections to center -->
    <line x1="55" y1="53" x2="55" y2="18" stroke="#0EA5E9" stroke-width="1" opacity="0.35"/>
    <line x1="55" y1="53" x2="82" y2="35" stroke="#14B8A6" stroke-width="1" opacity="0.35"/>
    <line x1="55" y1="53" x2="82" y2="70" stroke="#0F766E" stroke-width="1" opacity="0.35"/>
    <line x1="55" y1="53" x2="55" y2="88" stroke="#0EA5E9" stroke-width="1" opacity="0.35"/>
    <line x1="55" y1="53" x2="28" y2="70" stroke="#14B8A6" stroke-width="1" opacity="0.35"/>
    <line x1="55" y1="53" x2="28" y2="35" stroke="#0F766E" stroke-width="1" opacity="0.35"/>
    <!-- Location pin in center -->
    <path d="M55 45 C51 45 48 48 48 51.5 C48 56 55 63 55 63 C55 63 62 56 62 51.5 C62 48 59 45 55 45Z" fill="url(#pinGrad)" opacity="0.9"/>
    <circle cx="55" cy="51" r="2.5" fill="white"/>
    <!-- Rising arrows -->
    <path d="M78 22 L88 8 L92 18" stroke="url(#arrowGrad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M72 30 L80 18 L84 26" stroke="url(#arrowGrad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <!-- Curved swoosh -->
    <path d="M20 80 Q40 95 75 78" stroke="url(#swooshGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Text: Transit -->
  <text x="125" y="58" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#1A3A4A" letter-spacing="-1">Transit</text>
  <!-- Text: Ops -->
  <text x="125" y="100" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#1A3A4A" letter-spacing="-1">Ops</text>
  
  <!-- Subtitle -->
  <text x="244" y="100" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#64748B" letter-spacing="2" text-transform="uppercase">ERP</text>
  <text x="244" y="113" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#94A3B8" letter-spacing="1.5">FLEET OPERATIONS</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="arrowGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="arrowGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
</svg>
